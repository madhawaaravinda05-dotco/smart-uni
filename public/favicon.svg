<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shield-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#243b61" />
      <stop offset="100%" stop-color="#121e33" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A" />
      <stop offset="20%" stop-color="#FCD34D" />
      <stop offset="50%" stop-color="#B45309" />
      <stop offset="80%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#92400E" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Shield Shape -->
  <path d="M 60 10 C 60 10 100 15 100 35 V 75 C 100 95 60 115 60 115 C 60 115 20 95 20 75 V 35 C 20 15 60 10 60 10 Z" fill="url(#shield-bg)" stroke="url(#gold)" stroke-width="2.5" filter="url(#shadow)" />
  
  <!-- Outer Ring -->
  <circle cx="60" cy="60" r="28" fill="none" stroke="url(#gold)" stroke-width="2" />
  
  <!-- Inner Ring -->
  <circle cx="60" cy="60" r="22" fill="none" stroke="url(#gold)" stroke-width="1.5" />
  
  <!-- Compass Points -->
  <path d="M 60 15 L 64 38 L 60 35 L 56 38 Z" fill="url(#gold)" />
  <path d="M 60 105 L 64 82 L 60 85 L 56 82 Z" fill="url(#gold)" />
  <path d="M 105 60 L 82 56 L 85 60 L 82 64 Z" fill="url(#gold)" />
  <path d="M 15 60 L 38 56 L 35 60 L 38 64 Z" fill="url(#gold)" />
  
  <path d="M 80 40 L 72 45 L 70 42 Z" fill="url(#gold)" />
  <path d="M 40 40 L 48 45 L 50 42 Z" fill="url(#gold)" />
  <path d="M 80 80 L 72 75 L 70 78 Z" fill="url(#gold)" />
  <path d="M 40 80 L 48 75 L 50 78 Z" fill="url(#gold)" />

  <!-- UC Text -->
  <text x="60" y="70" font-size="30" font-weight="900" font-family="Inter, system-ui, sans-serif" fill="url(#gold)" text-anchor="middle" letter-spacing="-1">UC</text>
  
  <!-- Top Left: Book -->
  <g stroke="url(#gold)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(26, 26)">
    <path d="M 0 3 C 2 1 5 1 7 3 V 11 C 5 9 2 9 0 11 Z" />
    <path d="M 14 3 C 12 1 9 1 7 3 V 11 C 9 9 12 9 14 11 Z" />
  </g>

  <!-- Top Right: Chart -->
  <g stroke="url(#gold)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(80, 26)">
    <circle cx="2" cy="11" r="1" />
    <circle cx="7" cy="6" r="1" />
    <circle cx="12" cy="1" r="1" />
    <path d="M 3 10 L 6 7" />
    <path d="M 8 5 L 11 2" />
  </g>

  <!-- Bottom Left: Pillar -->
  <g stroke="url(#gold)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(27, 81)">
    <path d="M 1 2 H 11" />
    <path d="M 2 2 V 10" />
    <path d="M 6 2 V 10" />
    <path d="M 10 2 V 10" />
    <path d="M 0 10 H 12" />
  </g>

  <!-- Bottom Right: Field -->
  <g stroke="url(#gold)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(79, 83)">
    <rect x="0" y="0" width="14" height="9" rx="1" />
    <path d="M 7 0 V 9" />
    <circle cx="7" cy="4.5" r="2" />
  </g>
</svg>