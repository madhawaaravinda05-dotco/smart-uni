<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unify — Campus Life Platform</title>
    <meta name="description" content="Find boardings, food, and transport near your Sri Lankan university campus." />
    <!-- Google Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
      .leaflet-container { font-family: 'Inter', -apple-system, sans-serif; }
      .leaflet-popup-content-wrapper { border-radius: 16px !important; box-shadow: 0 12px 40px rgba(124,58,237,.18) !important; border: 1.5px solid rgba(124,58,237,.12) !important; padding: 0 !important; overflow: hidden; }
      .leaflet-popup-content { margin: 0 !important; }
      .leaflet-popup-tip-container { display: none; }
      .leaflet-control-zoom { border: none !important; box-shadow: 0 4px 20px rgba(124,58,237,.18) !important; border-radius: 14px !important; overflow: hidden; }
      .leaflet-control-zoom a { border: none !important; color: #7C3AED !important; font-weight: 700 !important; }
      .leaflet-control-zoom a:hover { background: #F5F3FF !important; color: #6D28D9 !important; }
      .leaflet-control-attribution { font-size: 9px !important; background: rgba(255,255,255,.88) !important; backdrop-filter: blur(8px); border-radius: 12px 0 0 0 !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
